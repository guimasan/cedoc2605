<!doctype html>
<html lang="pt-BR">

  <title>Galeria - Versão 1</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f7f6}
    header{padding:12px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
    nav a{margin-right:8px;padding:8px 12px;border-radius:10px;background:#fff;text-decoration:none;color:#111}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:20px;max-width:1200px;margin:18px auto}
    .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.06)}
    .card img{width:100%;height:180px;object-fit:cover;display:block}
    .card .body{padding:12px}
  </style>
