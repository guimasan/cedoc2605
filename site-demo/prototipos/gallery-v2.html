<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Galeria - Versão 2</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#fff}
    header{padding:12px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
    nav a{margin-right:8px;padding:8px 12px;border-radius:10px;background:#fff8e1;text-decoration:none;color:#111}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:20px;max-width:1200px;margin:18px auto}
    .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.04)}
    .card img{width:100%;height:200px;object-fit:cover;display:block}
    .card .body{padding:12px}
    aside{width:300px;float:right;margin-right:20px}
  </style>
</head>
<body data-image-base="../assets/images/">
  <header>
    <div><strong>Versão 2</strong></div>
    <nav>
      <a class="featured">CEACA Sobre nós</a>
      <a>Articulação</a>
      <a>Documentação</a>
      <a>Educação</a>
      <a>Eventos</a>
    </nav>
    <div>🔍</div>
  </header>
  <main>
    <aside>
      <div style="background:#fff;padding:12px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.04)">Filtros</div>
    </aside>
    <div class="grid">
      <div class="card"><img data-random="true" src="../assets/images/capa.png" alt="img"><div class="body"><h4>Item A</h4><p>Resumo</p></div></div>
      <div class="card"><img data-random="true" src="../assets/images/section_default.png" alt="img"><div class="body"><h4>Item B</h4><p>Resumo</p></div></div>
      <div class="card"><img data-random="true" src="../assets/images/section_tabs.png" alt="img"><div class="body"><h4>Item C</h4><p>Resumo</p></div></div>
      <div class="card"><img data-random="true" src="../assets/images/section_accordion.png" alt="img"><div class="body"><h4>Item D</h4><p>Resumo</p></div></div>
    </div>
  </main>
  <script src="../shared/random-images.js"></script>
</body>
</html>
