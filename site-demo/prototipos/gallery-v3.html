<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Galeria - Versão 3</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f7f9fb}
    header{padding:12px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
    nav a{margin-right:8px;padding:8px 12px;border-radius:10px;background:#f7f9f9;text-decoration:none;color:#111}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;padding:20px;max-width:1200px;margin:18px auto}
    .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.04)}
    .card img{width:100%;height:220px;object-fit:cover;display:block}
    .card .body{padding:12px}
  </style>
</head>
<body data-image-base="../assets/images/">
  <header>
    <div><strong>Versão 3</strong></div>
    <nav>
      <a class="featured">CEACA Sobre nós</a>
      <a>Articulação</a>
      <a>Documentação</a>
      <a>Educação</a>
      <a>Eventos</a>
    </nav>
    <div>🔍</div>
  </header>
  <main>
    <div class="grid">
      <div class="card"><img data-random="true" src="../assets/images/capa.png" alt="img"><div class="body"><h4>Obra 1</h4><p>Resumo</p></div></div>
      <div class="card"><img data-random="true" src="../assets/images/logo.svg" alt="img"><div class="body"><h4>Obra 2</h4><p>Resumo</p></div></div>
      <div class="card"><img data-random="true" src="../assets/images/logo-footer.svg" alt="img"><div class="body"><h4>Obra 3</h4><p>Resumo</p></div></div>
      <div class="card"><img data-random="true" src="../assets/images/section_default.png" alt="img"><div class="body"><h4>Obra 4</h4><p>Resumo</p></div></div>
    </div>
  </main>
  <script src="../shared/random-images.js"></script>
</body>
</html>
